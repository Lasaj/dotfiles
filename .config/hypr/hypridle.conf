general {
    lock_cmd = pidof hyprlock || hyprlock
    unlock_cmd = killall hyprlock
    before_sleep_cmd = loginctl lock-session && playerctl -a pause
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 600                                 # 10 mins
    on-timeout = loginctl lock-session            # lock screen
}

listener {
    timeout = 660                                 # 11 mins
    on-timeout = hyprctl dispatch dpms off        # turn off screen
    on-resume = hyprctl dispatch dpms on          # turn on screen
}

listener {
    timeout = 900                                 # 15 mins
    on-timeout = systemctl suspend                # suspend computer
}
