background {
    monitor =
    path = /home/rick/Pictures/Wallpaper/unused/2026_01_21_000054410001_400TX.jpg
    blur_passes = 0  # disabled blur to show the photo clearly
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgb(50, 49, 69)
    inner_color = rgb(31, 31, 40)
    font_color = rgb(220, 215, 186)
    fade_on_empty = false
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(220, 215, 186)
    font_size = 55
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}
