# Kitty Configuration (Gnome-Terminal Style & Gruvbox Dark Theme)

# Font Settings
font_family      Hasklug Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# Window Layout
remember_window_size  no
initial_width         100c
initial_height        28c
window_padding_width  10
confirm_os_window_close 0
hide_window_decorations yes

# Transparency
background_opacity 0.85

# Audio Settings
enable_audio_bell no

# Colorscheme: Gruvbox Dark (Medium Contrast)
background            #212121
foreground            #ebdbb2
selection_foreground  #ebdbb2
selection_background  #458588
cursor                #928374
cursor_text_color     background

# Black
color0  #282828
color8  #928374

# Red
color1  #cc241d
color9  #fb4934

# Green
color2  #98971a
color10 #b8bb26

# Yellow
color3  #d79921
color11 #fabd2f

# Blue
color4  #458588
color12 #83a598

# Purple (Magenta)
color5  #b16286
color13 #d3869b

# Aqua (Cyan)
color6  #689d6a
color14 #8ec07c

# White
color7  #a89984
color15 #ebdbb2

# Easy Copy & Paste
copy_on_select yes
strip_trailing_spaces smart

# Mouse mappings: Middle-click to paste from clipboard
mouse_map middle release ungrabbed paste_from_clipboard

# URL Opening
open_url_with firefox

# Open new windows and tabs in the current working directory
map ctrl+shift+enter launch --cwd=current
map ctrl+shift+t     launch --type=tab --cwd=current

# Increase scrollback buffer lines
scrollback_lines 10000

# Styled Tab Bar
tab_bar_style       powerline
tab_powerline_style slanted
active_tab_foreground   #ebdbb2
active_tab_background   #458588
inactive_tab_foreground #a89984
inactive_tab_background #3c3836

# Text Cursor shape
cursor_shape          beam
cursor_blink_interval 0.5

# URL Styles
url_color #8ec07c
url_style curly
